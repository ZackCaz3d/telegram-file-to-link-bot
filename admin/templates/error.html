<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
  <link rel="stylesheet" href="/static/css/admin.css?v=2">
</head>
<body class="login-page">
  <div class="login-card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:12px">{{ icon }}</div>
    <h1 style="font-size:20px;font-weight:700;margin-bottom:8px">{{ title }}</h1>
    <p class="text-muted" style="margin-bottom:8px">{{ message }}</p>

    {% if hint %}
      <p class="text-muted text-sm">{{ hint }}</p>
    {% endif %}

    {% if back_url %}
      <a href="{{ back_url }}" class="btn btn-primary" style="margin-top:16px;display:inline-flex">Go Back</a>
    {% endif %}
  </div>

  <script>
    if (localStorage.getItem('admin-theme') === 'dark' ||
        (!localStorage.getItem('admin-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.body.classList.add('dark');
    }
  </script>
</body>
</html>
