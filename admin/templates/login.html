<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - File Bot Admin</title>
  <link rel="stylesheet" href="/static/css/admin.css?v=2">
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-header">
      <span class="brand-icon" style="font-size:32px">&#9889;</span>
      <h1>File Bot Admin</h1>
      <p class="text-muted">Sign in to your account</p>
    </div>

    {% if error %}
      <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="post" class="login-form">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" name="email" placeholder="admin@example.com" required class="form-input">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" placeholder="Password" required class="form-input">
      </div>
      <button type="submit" class="btn btn-primary btn-full">Sign In</button>
    </form>
  </div>

  <script>
    if (localStorage.getItem('admin-theme') === 'dark' ||
        (!localStorage.getItem('admin-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.body.classList.add('dark');
    }
  </script>
</body>
</html>
